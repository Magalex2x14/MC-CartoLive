name: Publish Docker image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: n30nex/mc-cartolive

jobs:
  publish:
    name: Build and publish GHCR image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare build metadata
        id: build_meta
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then
            version="$(cat VERSION)"
          fi
          short_sha="${GITHUB_SHA::7}"
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          build_number="$(date -u +%Y%m%dT%H%M%SZ)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "git_sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "build_time=$build_time" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=MC-CartoLive
            org.opencontainers.image.description=Public-safe MeshCore MQTT live map with routed packet replay
            org.opencontainers.image.source=https://github.com/n30nex/MC-CartoLive
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.build_meta.outputs.version }}
            VITE_GIT_SHA=${{ steps.build_meta.outputs.git_sha }}
            VITE_BUILD_TIME=${{ steps.build_meta.outputs.build_time }}
            VITE_BUILD_NUMBER=${{ steps.build_meta.outputs.build_number }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
