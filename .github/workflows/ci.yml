name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Test
        working-directory: backend
        run: go test ./...

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      - name: Test
        working-directory: web
        run: npm test -- --run

      - name: Build
        working-directory: web
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          provenance: false
          tags: meshcore-canada-live-map:ci
          build-args: |
            APP_VERSION=2.4.6

      - name: Smoke built image
        run: |
          docker run -d --name mc-cartolive-ci -p 18080:8080 \
            -e MQTT_ENABLED=false \
            -e PUBLIC_MODE=true \
            -e PUBLIC_BASE_URL=http://127.0.0.1:18080 \
            -e FIXTURE_REPLAY_PATH=/app/examples/fixtures/synthetic-live.ndjson \
            meshcore-canada-live-map:ci
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:18080/healthz >/tmp/mc-health.json; then
              break
            fi
            sleep 1
          done
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:18080/readyz >/tmp/mc-ready.json; then
              break
            fi
            sleep 1
          done
          grep -q '"version":"2.4.6"' /tmp/mc-health.json
          docker exec mc-cartolive-ci test -s /app/examples/fixtures/synthetic-live.ndjson

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
