services:
  meshcore-live-map:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-2.4.8}
        VITE_BUILD_NUMBER: ${VITE_BUILD_NUMBER:-}
        VITE_GIT_SHA: ${VITE_GIT_SHA:-}
        VITE_BUILD_TIME: ${VITE_BUILD_TIME:-}
    container_name: meshcore-canada-live-map
    ports:
      - "39476:8080"
    env_file:
      - .env
    environment:
      APP_VERSION: ${APP_VERSION:-2.4.8}
      GIT_SHA: ${VITE_GIT_SHA:-}
      BUILD_TIME: ${VITE_BUILD_TIME:-}
    volumes:
      - ./data:/app/data
      - ./examples:/app/examples:ro
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped
