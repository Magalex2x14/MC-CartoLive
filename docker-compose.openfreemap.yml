services:
  meshcore-openfreemap-live-map:
    build:
      context: .
      args:
        VITE_OPENFREEMAP_STYLE_URL: ${VITE_OPENFREEMAP_STYLE_URL:-}
        VITE_OPENFREEMAP_TILEJSON_URL: ${VITE_OPENFREEMAP_TILEJSON_URL:-https://tiles.openfreemap.org/planet}
        VITE_TERRAIN_TILEJSON_URL: ${VITE_TERRAIN_TILEJSON_URL:-https://demotiles.maplibre.org/terrain-tiles/tiles.json}
        VITE_TERRAIN_EXAGGERATION: ${VITE_TERRAIN_EXAGGERATION:-1.25}
    image: meshcore-canada-live-map:openfreemap-dev
    container_name: meshcore-canada-live-map-openfreemap
    ports:
      - "${OPENFREEMAP_HOST_PORT:-39477}:8080"
    env_file:
      - .env
    environment:
      PUBLIC_BASE_URL: ${OPENFREEMAP_PUBLIC_BASE_URL:-http://localhost:39477}
      MQTT_CLIENT_ID: meshcore-canada-live-map-openfreemap-local
    volumes:
      - ./data-openfreemap:/app/data
      - ./examples:/app/examples:ro
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped
